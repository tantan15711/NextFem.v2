services:
  - type: web
    name: nextfem-backend
    runtime: node
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm run deploy:start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://next-fem-v2.vercel.app
      - key: JWT_SECRET
        generateValue: true
      - key: MESSAGE_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: nextfem-db
          property: connectionString
      - key: DATABASE_SSL
        value: "true"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.5
      - key: OPENAI_REASONING_EFFORT
        value: low

databases:
  - name: nextfem-db
    databaseName: marketplace_mujeres
    user: nextfem
